# cross-rs configuration
#
# Only the `tt-watcher` binary (built for *-unknown-linux-gnu) needs system
# libraries: smithay-client-toolkit (transitively required by cosmic-client-
# toolkit) links against libxkbcommon at build time. The main `tt` binary
# stays musl-static and has no system-library dependencies.
#
# For aarch64 we add the arm64 multiarch repo and install the :arm64 variant
# of the dev package so headers + .pc files resolve for cross-compilation.

[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install --assume-yes libxkbcommon-dev",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install --assume-yes libxkbcommon-dev:arm64",
]
