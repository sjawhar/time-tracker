# Time Tracker tmux hook configuration
#
# Records pane focus + scroll events for time tracking. Four focus hooks cover all
# navigation paths; a fifth (pane-mode-changed) fires when a pane enters copy-mode
# (e.g. mouse-wheel up). The 500ms debounce in tt deduplicates overlapping fires.
#
# Installation:
#   1. Ensure `tt` is in your PATH
#   2. Add to ~/.tmux.conf: source-file /path/to/config/tmux-hook.conf
#   3. Reload tmux: tmux source-file ~/.tmux.conf
#   4. IMPORTANT: Detach and reattach for focus-events to take effect
#
# Verify it's working:
#   - Switch between panes/windows/sessions
#   - Check ~/.local/share/time-tracker/events.jsonl for new events
#   - Check ~/.local/state/time-tracker/hook.log for errors
#
# SECURITY: every tmux value handed to the shell uses the `#{q:...}` modifier, which
# shell-escapes it. NEVER interpolate a raw `#{pane_current_path}` / `#{session_name}`
# inside a quoted shell word — a path or session name containing $(...), backticks, or
# quotes would otherwise execute as shell code when the hook fires.

# Enable focus events (required for pane-focus-in hook)
set -g focus-events on

# Record pane focus changes for time tracking.
# - -ga appends to not clobber other hooks on the same event
# - -b runs in background (non-blocking, prevents pane switch lag)
# - #{q:...} shell-escapes each value (injection-safe)
# - stderr goes to hook.log for debuggability

# Terminal regains OS-level focus (e.g. alt-tab back to terminal)
set-hook -ga pane-focus-in 'run-shell -b "mkdir -p $HOME/.local/state/time-tracker && tt ingest pane-focus --pane #{q:pane_id} --cwd #{q:pane_current_path} --session #{q:session_name} --window #{q:window_index} 2>>$HOME/.local/state/time-tracker/hook.log"'
# Switch panes within a window (e.g. Ctrl-b arrow)
set-hook -ga after-select-pane 'run-shell -b "mkdir -p $HOME/.local/state/time-tracker && tt ingest pane-focus --pane #{q:pane_id} --cwd #{q:pane_current_path} --session #{q:session_name} --window #{q:window_index} 2>>$HOME/.local/state/time-tracker/hook.log"'
# Switch windows within a session
set-hook -ga session-window-changed 'run-shell -b "mkdir -p $HOME/.local/state/time-tracker && tt ingest pane-focus --pane #{q:pane_id} --cwd #{q:pane_current_path} --session #{q:session_name} --window #{q:window_index} 2>>$HOME/.local/state/time-tracker/hook.log"'
# Switch between tmux sessions
set-hook -ga client-session-changed 'run-shell -b "mkdir -p $HOME/.local/state/time-tracker && tt ingest pane-focus --pane #{q:pane_id} --cwd #{q:pane_current_path} --session #{q:session_name} --window #{q:window_index} 2>>$HOME/.local/state/time-tracker/hook.log"'

# Scroll: mouse-wheel up (or any copy-mode entry) fires pane-mode-changed once, marking
# the pane active and refreshing the attention window at that moment.
# NOTE: this fires on copy-mode ENTER, not on every wheel tick — long copy-mode reading
# past the attention window still relies on the cap. Per-tick capture would require
# binding the wheel keys in copy-mode (a separate, terminal-specific change).
set-hook -ga pane-mode-changed 'run-shell -b "mkdir -p $HOME/.local/state/time-tracker && tt ingest scroll --pane #{q:pane_id} --cwd #{q:pane_current_path} --session #{q:session_name} --window #{q:window_index} 2>>$HOME/.local/state/time-tracker/hook.log"'
