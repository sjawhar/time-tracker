# cargo-deny configuration
# Run with: cargo deny check

[advisories]
db-path = "~/.cargo/advisory-db"
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "GPL-3.0-only",
]

# cosmic-client-toolkit (cctk) does not declare a license field in its Cargo.toml,
# but the COSMIC project is published under GPL-3.0-only. See:
# https://github.com/pop-os/cosmic-client-toolkit
[[licenses.clarify]]
crate = "cosmic-client-toolkit"
expression = "GPL-3.0-only"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "allow"  # Workspace dependencies show as wildcards
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/pop-os/cosmic-protocols"]
